syntax = "proto3";

package auth;

option go_package = "tuzov.sso.v1'ssov1";

service Auth {
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Login (LoginResquest) returns (LoginResponse);
    rpc IsAdmin (IsAdminRequest) returns (AdminResponse); 
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message RegisterResponse {
    int64 user_id = 1;
}

message LoginResquest {
    string email = 1;
    string password = 2;
    int32 app_id = 3;
}

message LoginResponse {
    string token = 1;
}

message IsAdminRequest {
    int64 user_id = 1;
}

message AdminResponse {
    bool is_admin = 1;
}